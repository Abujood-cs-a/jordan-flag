<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Palestinian Flag</title>
  <style>
    * {
      box-sizing: border-box;
      padding: 0;
      margin: 0;
    }

    body {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-color: #1a1a2e;
      gap: 2rem;
    }

    .flag-container {
      position: relative;
      display: flex;
      align-items: flex-start;
    }

    /* Gold pole */
    .pole {
      width: 8px;
      height: 320px;
      background: linear-gradient(to right, #b8860b, #f5d16a, #b8860b);
      border-radius: 4px;
      position: absolute;
      left: 0;
      top: -25px;
      box-shadow: 1px 0 4px rgba(0, 0, 0, 0.4);
    }

    /* Flag wrapper */
    .flag-wrapper {
      position: relative;
      width: 540px;
      height: 270px;
      border-radius: 2px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0, 0, 0, 0.5), 0 0 0 1.5px rgba(0, 0, 0, 0.2);
      animation: flagWave 3.5s ease-in-out infinite;
      transform-origin: left center;
    }

    /* Stripes */
    .stripe-black {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 33.33%;
      background: #111111;
    }

    .stripe-white {
      position: absolute;
      top: 33.33%; left: 0;
      width: 100%; height: 33.34%;
      background: #ffffff;
    }

    .stripe-green {
      position: absolute;
      top: 66.67%; left: 0;
      width: 100%; height: 33.33%;
      background: #007A3D;
    }

    /* Red triangle */
    .triangle {
      position: absolute;
      top: 0; left: 0;
      width: 0; height: 0;
      border-style: solid;
      border-width: 135px 0 135px 220px;
      border-color: transparent transparent transparent #CE1126;
      filter: drop-shadow(2px 0 6px rgba(0, 0, 0, 0.2));
    }

    /* Star inside triangle */
    .star-wrap {
      position: absolute;
      top: 50%;
      left: 80px;
      transform: translate(-50%, -50%);
      animation: starSpin 8s linear infinite;
    }

    /* Shimmer overlay */
    .shimmer {
      position: absolute;
      top: 0; left: -100%;
      width: 60%; height: 100%;
      background: linear-gradient(
        90deg,
        transparent 0%,
        rgba(255, 255, 255, 0.12) 50%,
        transparent 100%
      );
      animation: shimmerMove 4s ease-in-out infinite;
      pointer-events: none;
    }

    /* Label */
    .label {
      font-family: sans-serif;
      font-size: 14px;
      color: rgba(255, 255, 255, 0.6);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Animations ── */
    @keyframes flagWave {
      0%   { transform: perspective(900px) rotateY(0deg)    skewY(0deg); }
      25%  { transform: perspective(900px) rotateY(2deg)    skewY(0.6deg); }
      50%  { transform: perspective(900px) rotateY(-1.5deg) skewY(-0.4deg); }
      75%  { transform: perspective(900px) rotateY(2.5deg)  skewY(0.8deg); }
      100% { transform: perspective(900px) rotateY(0deg)    skewY(0deg); }
    }

    @keyframes starSpin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    @keyframes shimmerMove {
      0%   { left: -60%; }
      60%  { left: 110%; }
      100% { left: 110%; }
    }
  </style>
</head>
<body>

  <div class="flag-container">
    <div class="pole"></div>
    <div class="flag-wrapper">
      <div class="stripe-black"></div>
      <div class="stripe-white"></div>
      <div class="stripe-green"></div>
      <div class="triangle"></div>
      <div class="star-wrap">
        <svg viewBox="0 0 60 60" width="46" height="46">
          <polygon
            fill="white"
            points="30,3 36,22 56,22 40,34 46,53 30,41 14,53 20,34 4,22 24,22"
          />
        </svg>
      </div>
      <div class="shimmer"></div>
    </div>
  </div>

</body>
</html>
